# nginx site config for the Kyron Scribe app.
# __DOMAIN__ is replaced by deploy/scripts/deploy.sh.
# certbot --nginx upgrades this server block to listen on 443 with a redirect.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Streaming route: nginx MUST NOT buffer, or SOAP tokens arrive all at once.
    location /api/provider/encounters/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
