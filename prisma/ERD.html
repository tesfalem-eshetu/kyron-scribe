<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kyron Scribe — ERD</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f4f4f5;
        color: #18181b;
      }
      header {
        padding: 12px 20px;
        background: #fff;
        border-bottom: 1px solid #e4e4e7;
        font-size: 14px;
      }
      header strong {
        font-weight: 600;
      }
      .wrap {
        overflow: auto;
        padding: 16px;
        min-height: calc(100vh - 49px);
      }
      img {
        display: block;
        max-width: none;
        height: auto;
        background: #fff;
        border: 1px solid #e4e4e7;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Kyron Scribe</strong> — entity-relationship diagram from
      <code>schema.prisma</code>. Regenerate with <code>pnpm run erd</code>.
    </header>
    <div class="wrap">
      <img src="ERD.svg" alt="Kyron Scribe database ERD" width="100%" />
    </div>
  </body>
</html>
